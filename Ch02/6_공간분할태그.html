<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>6_공간분할태그</title>
    </head>
    <body>
        <h3>6. 공간 분할 태그</h3>

        <h4>block 형식 태그</h4>
        <div>div 태그 1</div><!-- division -->
        <div>div 태그 2</div>
        <div>div 태그 3</div>

        <p>
            동해물과 백두산이
        </p>
        <p>
            남산 위에 저 소나무
        </p>


        <h4>inline 형식 태그</h4>
        <span>span 태그 1</span><!-- 가로로 출력 -->
        <span>span 태그 2</span>
        <span>span 태그 3</span>

        <a href="#">네이버</a>
        <a href="#">구글</a>
        <a href="#">다음</a>

        <h4>inline-block 형식 태그</h4>
        <img src="./images/실습이미지/flower1.jpg" width="200" alt="벚꽃">
        <img src="./images/실습이미지/flower2.jpg" height="0100" alt="코스모스">
        <input type="text" size="10">

    </body>
</html>
