<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>7_CSS_플렉스박스</title>
    <style>
        section {
            width: 800px;
            height: 400px;
            border: 1px solid black;
            box-sizing: border-box;
            margin-bottom: 10px;
        }

        section > div {
            width: 100px;
            height: 100px;
            border: 1px solid rgb(59, 216, 255);
            box-sizing: border-box;
            background: rgb(182, 255, 233);
        }

        #container1 {
            display: flex;
            flex-direction: row;
            justify-content: center;
            align-items: center;
        }
        @keyframes slideRight {
        from {
            transform: translateX(0); /* 시작 위치 */
        }
        to {
            transform: translateX(100px); /* 끝 위치 */
        }
        }
        #container2 {
            display: flex;
            flex-direction: row;
            justify-content: space-around;
            align-items: center;
            /* 애니메이션 적용 */
            animation-name: slideRight;    /* 정의한 이름 */
            animation-duration: 1s;        /* 2초 동안 재생 */
            animation-iteration-count: infinite; /* 무한 반복 */
            animation-direction: alternate; /* 왔다 갔다 */
        }

        #container3 {
            display: flex;
        }

        #container3 > div {
            width: 100%;
            height: 100%;
        }


    </style>
</head>
<body>
    <h3>7. CSS 플렉스 박스</h3>

    <section id="container1">
        <div>1</div>
        <div>2</div>
        <div>3</div>
        <div>4</div>
        <div>5</div>
    </section>

    <section id="container2">
        <div>1</div>
        <div>2</div>
        <div>3</div>
    </section>

    <section id="container3">
        <div>1</div>
        <div>2</div>
        <div>3</div>
        <div>4</div>
        <div>5</div>
        <div>6</div>
        <div>7</div>
    </section>
    
</body>
</html>
